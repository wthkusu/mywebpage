<!DOCTYPE html>
<html>
<head>
<style>
ul {
  list-style-type: square;
}

ul li {
  background-color: lightblue;
  padding: 10px;
}

ol {
  list-style-type: upper-roman;
}
</style>
</head>
<body>

<h3>Unordered List</h3>
<ul>
  <li>Item One</li>
  <li>Item Two</li>
  <li>Item Three</li>
</ul>

<h3>Ordered List</h3>
<ol>
  <li>First</li>
  <li>Second</li>
  <li>Third</li>
</ol>

</body>
</html>
