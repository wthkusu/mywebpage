<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Prime</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0d9ce9;
    color:white;
    margin:20px;
}

.gallery{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:15px;
}

.card{
    background:#222;
    padding:40px;
    border-radius:8px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<h2>Prime Video</h2>

<div class="gallery">
<div class="card">Movie 1</div>
<div class="card">Movie 2</div>
<div class="card">Movie 3</div>
<div class="card">Movie 4</div>
<div class="card">Movie 5</div>
<div class="card">Movie 6</div>
<div class="card">Movie 7</div>
<div class="card">Movie 8</div>
</div>

</body>
</html>
