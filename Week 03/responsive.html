<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Prime</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0d9ce9;
    color:white;
    margin:20px;
}

.flex-container{
    display:flex;
    flex-direction:row;
    flex-wrap:wrap;
    gap:15px;
}

.flex-item{
    background:#222;
    padding:40px;
    border-radius:8px;
    text-align:center;
    font-size:20px;
    flex:1 1 calc(33.33% - 15px);
    transition:0.3s;
}

.flex-item:hover{
    transform:scale(1.05);
}

@media (max-width: 900px){
    .flex-item{
        flex:1 1 calc(50% - 15px);
    }
}

@media (max-width: 600px){
    .flex-container{
        flex-direction:column;
    }
}

</style>
</head>

<body>

<h2>Prime Video</h2>

<div class="flex-container">
<div class="flex-item">Movie 1</div>
<div class="flex-item">Movie 2</div>
<div class="flex-item">Movie 3</div>
<div class="flex-item">Movie 4</div>
<div class="flex-item">Movie 5</div>
<div class="flex-item">Movie 6</div>
<div class="flex-item">Movie 7</div>
<div class="flex-item">Movie 8</div>
</div>

</body>
</html>
